<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios JavaScript</title>
    <link rel="stylesheet" href="assets/styles/ex1.css">
</head>
<body>

    <!-- 1. Mudar texto do título -->
    <h1 id="titulo">Título Original</h1>
    <button id="btnTitulo">Mudar Título</button>

    

    <!-- 2. Adicionar/Remover classe -->
    <p id="paragrafo">Texto para mudar a classe</p>
    <button id="btnClasse">Adicionar/Remover Classe</button>

    

    <!-- 3. Adicionar item na lista -->
    <ul id="lista">
        <li>Item 1</li>
    </ul>
    <button id="btnAdicionar">Adicionar Item</button>

    

    <!-- 4. Remover elemento -->
    <div id="caixa">
        Este elemento será removido.
    </div>
    <button id="btnRemover">Remover Elemento</button>

    

    <!-- 5. Alterar texto em tempo real -->
    <input type="text" id="inputTexto" placeholder="Digite algo">
    <h2 id="resultado">Texto aqui</h2>

    <script src="assets/scripts/ex1.js"></script>
</body>
</html>
